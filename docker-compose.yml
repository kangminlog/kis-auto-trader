services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kis_auto_trader
      POSTGRES_USER: kis
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kis_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kis"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - KIS_SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-32-chars!}
      - KIS_KIS_ENV=paper
      - KIS_DATABASE_URL=postgresql://kis:${DB_PASSWORD:-kis_dev_password}@db:5432/kis_auto_trader
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
