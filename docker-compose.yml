services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - KIS_SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-32-chars!}
      - KIS_KIS_ENV=paper
      - KIS_DATABASE_URL=sqlite:///./kis_auto_trader.db
    volumes:
      - backend-data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
